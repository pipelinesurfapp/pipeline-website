<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — The surf call.</title>
<meta name="description" content="Pipeline is a surf forecasting app coming soon to iOS. The surf call.">

<!-- Open Graph / Social sharing -->
<meta property="og:title" content="Pipeline — The surf call.">
<meta property="og:description" content="A surf forecasting app coming soon to iOS.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pipelinesurf.app">

<!-- Preload the hero image so it appears as fast as possible -->
<link rel="preload" as="image" href="./ocean-bg.jpg">

<!-- Body font from Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* Brand fonts */
  @font-face {
    font-family: "Ronale";
    src: url("./fonts/Ronale.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Zeminous";
    src: url("./fonts/Zeminous.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A1628;
    --tide: #0F1D33;
    --yellow: #F0B928;
    --cream: #F4E9D4;
    --teal: #5FB3A1;
    --red: #E8554B;
  }

  html, body {
    min-height: 100%;
    background: var(--navy);
    color: var(--cream);
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* Full-screen ocean background */
  .bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background-image: url("./ocean-bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }

  /* Vignette overlay — darkens edges so text reads cleanly without obscuring water */
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(10, 22, 40, 0) 30%, rgba(10, 22, 40, 0.35) 100%),
      linear-gradient(to bottom, rgba(10, 22, 40, 0.15) 0%, rgba(10, 22, 40, 0) 35%, rgba(10, 22, 40, 0) 65%, rgba(10, 22, 40, 0.55) 100%);
    pointer-events: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100svh;
    position: relative;
  }

  .page {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 64px 24px 48px;
  }

  .hero {
    width: 100%;
    max-width: 560px;
    margin-bottom: 48px;
  }

  /* PIPELINE wordmark — Ronale, gold, all caps */
  .wordmark {
    font-family: "Ronale", "Playfair Display", Georgia, serif;
    font-weight: normal;
    font-size: clamp(64px, 16vw, 132px);
    line-height: 0.9;
    color: var(--yellow);
    letter-spacing: 0.015em;
    text-transform: uppercase;
    text-shadow:
      0 2px 12px rgba(0, 0, 0, 0.4),
      0 0 40px rgba(240, 185, 40, 0.18);
    margin-bottom: 8px;
  }

  /* "the surf call." tagline — Zeminous, gold, lowercase */
  .tagline {
    font-family: "Zeminous", "Ronale", Georgia, serif;
    font-size: clamp(22px, 4.5vw, 32px);
    color: var(--yellow);
    letter-spacing: 0.02em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    margin-bottom: 0;
  }

  /* "Coming soon to iOS" badge */
  .coming-soon {
    display: inline-block;
    background: rgba(10, 22, 40, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--cream);
    font-family: "DM Sans", sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 999px;
    margin-top: 32px;
    border: 1px solid rgba(244, 233, 212, 0.15);
  }

  /* Email signup card */
  .signup-card {
    background: rgba(10, 22, 40, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(244, 233, 212, 0.12);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
  }

  .signup-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .signup-sub {
    font-size: 13px;
    color: rgba(244, 233, 212, 0.7);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .signup-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .signup-input {
    flex: 1;
    padding: 14px 16px;
    font-family: "DM Sans", sans-serif;
    font-size: 16px;
    border: 1.5px solid rgba(244, 233, 212, 0.2);
    border-radius: 12px;
    background: rgba(244, 233, 212, 0.06);
    color: var(--cream);
    transition: border-color 0.2s ease, background 0.2s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .signup-input::placeholder {
    color: rgba(244, 233, 212, 0.4);
  }

  .signup-input:focus {
    outline: none;
    border-color: var(--yellow);
    background: rgba(244, 233, 212, 0.1);
  }

  .signup-button {
    padding: 14px 22px;
    font-family: "DM Sans", sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    background: var(--yellow);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    white-space: nowrap;
  }

  .signup-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(240, 185, 40, 0.3);
  }

  .signup-button:active {
    transform: translateY(0);
  }

  .signup-button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .signup-message {
    margin-top: 14px;
    font-size: 13px;
    min-height: 18px;
    color: var(--teal);
    font-weight: 500;
    line-height: 1.4;
  }

  .signup-message.error {
    color: #FF8A82;
  }

  /* Footer with privacy / contact links */
  .footer {
    position: relative;
    z-index: 1;
    padding: 24px 24px 36px;
    text-align: center;
  }

  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .footer-links a {
    color: var(--cream);
    text-decoration: none;
    font-weight: 500;
    opacity: 0.7;
    transition: opacity 0.2s ease, color 0.2s ease;
    border-bottom: 1px solid rgba(244, 233, 212, 0.2);
    padding-bottom: 1px;
  }

  .footer-links a:hover {
    opacity: 1;
    color: var(--yellow);
    border-bottom-color: var(--yellow);
  }

  .copyright {
    font-size: 11px;
    color: rgba(244, 233, 212, 0.4);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  @media (min-width: 540px) {
    .signup-row {
      flex-direction: row;
    }
    .footer-links {
      flex-direction: row;
      gap: 28px;
    }
  }

  /* Smaller screens — pull hero up a bit */
  @media (max-height: 700px) {
    .page { padding-top: 32px; }
    .hero { margin-bottom: 32px; }
  }
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>

<main class="page">
  <div class="hero">
    <h1 class="wordmark">Pipeline</h1>
    <p class="tagline">the surf call.</p>
    <div class="coming-soon">Coming soon to iOS</div>
  </div>

  <form class="signup-card" id="signupForm" novalidate>
    <div class="signup-label">Get the call when Pipeline drops.</div>
    <p class="signup-sub">One email. No noise. Just a heads-up the moment we hit the App Store.</p>
    <div class="signup-row">
      <input
        type="email"
        class="signup-input"
        id="emailInput"
        placeholder="you@example.com"
        autocomplete="email"
        required
        aria-label="Email address"
      >
      <button type="submit" class="signup-button" id="signupButton">
        Notify me
      </button>
    </div>
    <div class="signup-message" id="signupMessage" role="status" aria-live="polite"></div>
  </form>
</main>

<footer class="footer">
  <div class="footer-links">
    <a href="/privacy/">Privacy Policy</a>
    <a href="mailto:hello@pipelinesurf.app">hello@pipelinesurf.app</a>
  </div>
  <div class="copyright">Pipeline · 2026</div>
</footer>

<script>
  // Email signup handler.
  // TODO: Replace SUBMIT_ENDPOINT with your Supabase edge function URL once set up.
  // Until then, submissions are queued in localStorage so nothing is lost.
  const SUBMIT_ENDPOINT = null; // e.g. "https://tcfgrznqfmrmpnbcclnw.supabase.co/functions/v1/email-signup"

  const form = document.getElementById('signupForm');
  const input = document.getElementById('emailInput');
  const button = document.getElementById('signupButton');
  const message = document.getElementById('signupMessage');

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showMessage(text, isError) {
    message.textContent = text;
    message.classList.toggle('error', !!isError);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = input.value.trim().toLowerCase();

    if (!isValidEmail(email)) {
      showMessage('Please enter a valid email address.', true);
      return;
    }

    button.disabled = true;
    button.textContent = 'Sending…';
    showMessage('');

    try {
      if (SUBMIT_ENDPOINT) {
        const res = await fetch(SUBMIT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, source: 'landing_page' })
        });
        if (!res.ok) throw new Error('Submission failed');
      } else {
        // Fallback: queue locally until endpoint is wired up
        const queued = JSON.parse(localStorage.getItem('pipeline_email_queue') || '[]');
        queued.push({ email: email, ts: new Date().toISOString() });
        localStorage.setItem('pipeline_email_queue', JSON.stringify(queued));
      }

      showMessage("You're on the list. We'll send the call.", false);
      input.value = '';
      button.textContent = 'Notify me';
      setTimeout(function() { button.disabled = false; }, 2000);
    } catch (err) {
      showMessage('Something went wrong. Try again or email hello@pipelinesurf.app.', true);
      button.disabled = false;
      button.textContent = 'Notify me';
    }
  });
</script>

</body>
</html>
